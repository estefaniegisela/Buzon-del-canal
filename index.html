<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Correo de la comunidad</title><style>body{margin:0;background:#121212;color:#eee;font-family:Arial,sans-serif}.wrap{max-width:700px;margin:30px auto;background:#1e1e1e;padding:24px;border-radius:14px}input,select,textarea{width:100%;padding:10px;margin:6px 0 14px;border-radius:8px;border:1px solid #555;background:#2b2b2b;color:#fff;box-sizing:border-box}button{width:100%;padding:12px;background:#6a5acd;color:#fff;border:0;border-radius:8px}.small{font-size:.9em;color:#bbb}</style></head><body><div class="wrap"><h1> El Buzón del Canal</h1><p>Comparte tus ideas, experiencias y reflexiones.Se parte de esta acogedora comunidad en internet!!! </p><form action="https://formsubmit.co/entrelineasfragmentadas@gmail.com" method="POST"><input type="hidden" name="_subject" value="Nuevo mensaje del Buzón del Canal"><input type="hidden" name="_captcha" value="false"><input type="hidden" name="_next" value="https://formsubmit.co/thanks"><label>Nombre (opcional)</label><input name="Nombre"><label>Como quieres aparecer:</label><select name="Aparecer"><option>Anonimo</option><option>Con mi nombre</option><option>Con un seudonimo</option></select><label>Edad:</label><input type="number" name="Edad" min="1" max="120"><label>Nacionalidad:</label><input name="Nacionalidad"><label>Tema: żDe que quieres hablar hoy?</label><select name="Tema"><option>Frase</option><option>Pensamiento del día</option><option>Experiencia</option><option>Sugerencia o consejo</option><option>Comentario</option><option>Relato personal</option><option>Pregunta</option><option>Historia</option><option>Debate</option><option>Otro</option></select><label>Califica el canal del 1 al 5:</label><select name="Califica"><option>1 Estrella</option><option>2 Estrellas</option><option>3 Estrellas</option><option>4 Estrellas</option><option>5 Estrellas</option></select><label>Lo que escribas, żdeseas que sea publicado? </label><select name="publicacion" required>  <option>Puede ser publicado</option>  <option>Solo privado</option></select><label>Mensaje (Escribe la fecha al inicio)</label><textarea name="Mensaje" rows="8" required></textarea><label><input type="checkbox" required style="width:auto"> Acepto el aviso de privacidad y entiendo que los datos enviados seran recibidos por la administradora del canal para revisar, responder, seleccionar o publicar el contenido, no todo el contenido sera publicado.</label><button>Enviar</button></form><p class="small">Gracias por leer y formar parte de esto.</p></div></body></html>
